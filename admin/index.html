<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Admin Dashboard - Love Stadium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --color-primary: #0F172A;
      --color-on-primary: #FFFFFF;
      --color-secondary: #1E293B;
      --color-accent: #22C55E;
      --color-background: #020617;
      --color-foreground: #F8FAFC;
      --color-muted: #1A1E2F;
      --color-border: #334155;
      --color-destructive: #EF4444;
      --color-destructive-hover: #DC2626;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--color-background);
      color: var(--color-foreground);
      font-family: 'Fira Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--color-border);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .stats {
      font-family: 'Fira Code', monospace;
      color: var(--color-accent);
      font-size: 14px;
      background: rgba(34, 197, 94, 0.1);
      padding: 6px 12px;
      border-radius: 99px;
    }

    .btn {
      appearance: none;
      border: none;
      background: transparent;
      font-family: 'Fira Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 10px 18px;
      border-radius: var(--radius);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-destructive {
      background-color: var(--color-destructive);
      color: white;
    }

    .btn-destructive:hover {
      background-color: var(--color-destructive-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .btn-destructive:active {
      transform: translateY(0);
    }

    .btn-outline {
      border: 1px solid var(--color-border);
      color: var(--color-foreground);
    }

    .btn-outline:hover {
      background-color: var(--color-secondary);
    }

    .card {
      background-color: var(--color-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: right;
    }

    th, td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
    }

    th {
      font-size: 13px;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(15, 23, 42, 0.5);
    }

    td {
      font-size: 15px;
    }

    tbody tr {
      transition: background-color 0.15s ease;
    }

    tbody tr:hover {
      background-color: rgba(255,255,255,0.03);
    }

    .club-id {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: #94A3B8;
      background: var(--color-background);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
    }

    .text-preview {
      max-width: 400px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: #94A3B8;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: #94A3B8;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--color-primary);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      transform: translateY(10px) scale(0.95);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal-title {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    .modal-body {
      color: #94A3B8;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--color-accent);
      color: var(--color-primary);
      padding: 12px 24px;
      border-radius: 99px;
      font-weight: 500;
      font-size: 15px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }
    
    .toast.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>ניהול מכתבים</h1>
        <div style="margin-top: 8px;">
          <span class="stats" id="totalCount">טוען נתונים...</span>
        </div>
      </div>
      <div>
        <button class="btn btn-destructive" id="btnDeleteAll">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          מחיקת כל המכתבים
        </button>
      </div>
    </header>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>תאריך</th>
              <th>קבוצה</th>
              <th>תוכן המכתב</th>
              <th style="width: 80px;">פעולות</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="4" class="empty-state">טוען...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h2 class="modal-title">מחיקת כל הנתונים</h2>
      <div class="modal-body">
        האם אתה בטוח שברצונך למחוק את <strong>כל</strong> המכתבים מהמערכת? פעולה זו היא בלתי הפיכה ולא ניתן יהיה לשחזר את המידע.
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btnCancelDelete">ביטול</button>
        <button class="btn btn-destructive" id="btnConfirmDelete">כן, מחק הכל</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast">פעולה בוצעה בהצלחה</div>

  <script>
    const SUPABASE_URL = 'https://svmgctxeojtdbntecohm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_x84awPDK6-HZgeeuP24keA_1UzGC5ri';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let letters = [];

    const tableBody = document.getElementById('tableBody');
    const totalCount = document.getElementById('totalCount');
    const modal = document.getElementById('deleteModal');
    const toastEl = document.getElementById('toast');
    let toastTimeout;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('active');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toastEl.classList.remove('active');
      }, 3000);
    }

    function formatDate(isoString) {
      const d = new Date(isoString);
      return d.toLocaleDateString('he-IL', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadData() {
      tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">טוען...</td></tr>';
      
      const { data, error } = await supabaseClient
        .from('letters')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">שגיאה בטעינת נתונים</td></tr>';
        totalCount.textContent = 'שגיאה';
        return;
      }

      letters = data || [];
      renderTable();
    }

    function renderTable() {
      totalCount.textContent = `${letters.length} מכתבים בסך הכל`;
      
      if (letters.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">אין מכתבים במערכת.</td></tr>';
        return;
      }

      tableBody.innerHTML = letters.map(l => `
        <tr>
          <td class="date" dir="ltr" style="text-align: right;">${formatDate(l.created_at)}</td>
          <td><span class="club-id">${l.club_id}</span></td>
          <td><div class="text-preview" title="${l.text.replace(/"/g, '&quot;')}">${l.text}</div></td>
          <td>
            <button class="btn btn-outline" style="padding: 6px; color: var(--color-destructive); border-color: transparent;" onclick="deleteSingle('${l.id}')" title="מחק">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    async function deleteSingle(id) {
      if (!confirm('האם אתה בטוח שברצונך למחוק מכתב זה?')) return;
      
      const { error } = await supabaseClient.from('letters').delete().eq('id', id);
      if (error) {
        alert('שגיאה במחיקה: ' + error.message);
      } else {
        showToast('המכתב נמחק בהצלחה');
        loadData();
      }
    }

    // Modal Handlers
    document.getElementById('btnDeleteAll').addEventListener('click', () => {
      if(letters.length === 0) {
        showToast('אין מה למחוק');
        return;
      }
      modal.classList.add('active');
    });

    document.getElementById('btnCancelDelete').addEventListener('click', () => {
      modal.classList.remove('active');
    });

    document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
      // Supabase trick to delete all rows: neq to something impossible, or in this case eq to themselves
      // actually, just deleting where id is not null works.
      const { error } = await supabaseClient.from('letters').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      
      modal.classList.remove('active');
      
      if (error) {
        alert('שגיאה במחיקת הנתונים: ' + error.message);
      } else {
        showToast('כל הנתונים נמחקו בהצלחה');
        loadData();
      }
    });

    // Initial load
    loadData();
    
    // Subscribe to realtime updates
    supabaseClient.channel('admin-channel')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'letters' }, () => {
        loadData(); // Reload on any change
      })
      .subscribe();

  </script>
</body>
</html>
