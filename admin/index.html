<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Admin Dashboard - Love Stadium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --color-primary: #0F172A;
      --color-on-primary: #FFFFFF;
      --color-secondary: #1E293B;
      --color-accent: #22C55E;
      --color-background: #020617;
      --color-foreground: #F8FAFC;
      --color-muted: #1A1E2F;
      --color-border: #334155;
      --color-destructive: #EF4444;
      --color-destructive-hover: #DC2626;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--color-background);
      color: var(--color-foreground);
      font-family: 'Fira Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--color-border);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .stats {
      font-family: 'Fira Code', monospace;
      color: var(--color-accent);
      font-size: 14px;
      background: rgba(34, 197, 94, 0.1);
      padding: 6px 12px;
      border-radius: 99px;
    }

    .btn {
      appearance: none;
      border: none;
      background: transparent;
      font-family: 'Fira Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 10px 18px;
      border-radius: var(--radius);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--color-foreground);
      color: var(--color-background);
    }

    .btn-primary:hover {
      background-color: #e2e8f0;
    }

    .btn-destructive {
      background-color: var(--color-destructive);
      color: white;
    }

    .btn-destructive:hover {
      background-color: var(--color-destructive-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .btn-destructive:active {
      transform: translateY(0);
    }

    .btn-outline {
      border: 1px solid var(--color-border);
      color: var(--color-foreground);
    }

    .btn-outline:hover {
      background-color: var(--color-secondary);
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    .card {
      background-color: var(--color-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: right;
    }

    th, td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
    }

    th {
      font-size: 13px;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(15, 23, 42, 0.5);
    }

    td {
      font-size: 15px;
    }

    tbody tr {
      transition: background-color 0.15s ease;
    }

    tbody tr:hover {
      background-color: rgba(255,255,255,0.03);
    }

    .club-id {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: #94A3B8;
      background: var(--color-background);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
    }

    .text-preview {
      max-width: 400px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: #94A3B8;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: #94A3B8;
    }

    /* Modals & Overlays */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--color-primary);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      transform: translateY(10px) scale(0.95);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal-title {
      margin: 0 0 12px 0;
      font-size: 20px;
      text-align: center;
    }

    .modal-body {
      color: #94A3B8;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* Auth Forms */
    .auth-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 13px;
      color: #94A3B8;
    }

    .form-group input {
      background: var(--color-background);
      border: 1px solid var(--color-border);
      color: var(--color-foreground);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--color-accent);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--color-border);
      margin: 16px 0;
    }
    
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--color-border);
    }
    
    .auth-divider:not(:empty)::before {
      margin-left: .25em;
    }
    
    .auth-divider:not(:empty)::after {
      margin-right: .25em;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--color-accent);
      color: var(--color-primary);
      padding: 12px 24px;
      border-radius: 99px;
      font-weight: 500;
      font-size: 15px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }
    
    .toast.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #appContent {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Login Modal (Always visible if not logged in) -->
  <div class="modal-overlay active" id="loginOverlay" style="background: var(--color-background);">
    <div class="modal">
      <h2 class="modal-title">כניסת מנהל</h2>
      
      <div class="auth-container">
        <!-- Email Login -->
        <form id="emailLoginForm" onsubmit="handleEmailLogin(event)">
          <div class="form-group" style="margin-bottom: 16px;">
            <label>אימייל</label>
            <input type="email" id="emailInput" placeholder="admin@domain.com" required dir="ltr" autocomplete="email">
          </div>
          <div class="form-group" style="margin-bottom: 24px;">
            <label>סיסמה</label>
            <input type="password" id="passwordInput" placeholder="••••••••" required dir="ltr" autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="btnEmailLogin">התחברות</button>
        </form>

        <div class="auth-divider">או</div>

        <!-- Social Logins -->
        <button class="btn btn-outline btn-full" onclick="signInWithProvider('google')">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="fill: currentColor; margin-left: 8px;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          התחבר עם Google
        </button>

        <button class="btn btn-outline btn-full" onclick="signInWithProvider('apple')">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="fill: currentColor; margin-left: 8px;"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm1.6 15.66c-1.39.02-2.3-.67-2.84-.67-.56 0-1.63.7-2.92.68-1.68-.02-3.23-1.01-4.09-2.58-1.78-3.18-.46-7.89 1.25-10.42 1.4-2.06 3.25-2.5 4.54-2.5 1.57 0 2.5.75 3.32.75.82 0 1.95-.87 3.52-.75 2.1.18 3.5 1.09 4.38 2.37-3.4 2.16-2.9 6.2.78 7.62-.73 1.92-1.99 4.24-3.52 6.37-.87 1.26-1.55 2.12-2.73 2.12-.13 0-.25-.01-.38-.02h-1.31v.03zm-1.04-12.8c.7-.85 1.18-2.04 1.05-3.23-1.04.04-2.31.7-3.03 1.58-.64.77-1.2 1.99-1.05 3.16 1.15.09 2.32-.65 3.03-1.51z"/></svg>
          התחבר עם Apple
        </button>
      </div>
    </div>
  </div>

  <div id="appContent">
    <div class="container">
      <header>
        <div>
          <h1>ניהול מכתבים</h1>
          <div style="margin-top: 8px;">
            <span class="stats" id="totalCount">טוען נתונים...</span>
          </div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <button class="btn btn-outline" id="btnLogout" onclick="logout()">התנתק</button>
          <button class="btn btn-destructive" id="btnDeleteAll">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            מחיקת הכל
          </button>
        </div>
      </header>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>תאריך</th>
                <th>קבוצה</th>
                <th>תוכן המכתב</th>
                <th style="width: 80px;">פעולות</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="4" class="empty-state">טוען...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h2 class="modal-title">מחיקת כל הנתונים</h2>
      <div class="modal-body">
        האם אתה בטוח שברצונך למחוק את <strong>כל</strong> המכתבים מהמערכת? פעולה זו היא בלתי הפיכה ולא ניתן יהיה לשחזר את המידע.
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btnCancelDelete">ביטול</button>
        <button class="btn btn-destructive" id="btnConfirmDelete">כן, מחק הכל</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast">פעולה בוצעה בהצלחה</div>

  <script>
    const SUPABASE_URL = 'https://svmgctxeojtdbntecohm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_x84awPDK6-HZgeeuP24keA_1UzGC5ri';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let letters = [];

    const loginOverlay = document.getElementById('loginOverlay');
    const appContent = document.getElementById('appContent');
    const tableBody = document.getElementById('tableBody');
    const totalCount = document.getElementById('totalCount');
    const modal = document.getElementById('deleteModal');
    const toastEl = document.getElementById('toast');
    const btnEmailLogin = document.getElementById('btnEmailLogin');
    let toastTimeout;

    // --- Authentication Logic ---

    // Check auth status on load
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      handleAuthChange(session);
    });

    // Listen for auth changes (like logging in via Google redirect)
    supabaseClient.auth.onAuthStateChange((_event, session) => {
      handleAuthChange(session);
    });

    function handleAuthChange(session) {
      if (session) {
        // User is logged in
        loginOverlay.classList.remove('active');
        appContent.style.display = 'block';
        loadData();
      } else {
        // User is logged out
        loginOverlay.classList.add('active');
        appContent.style.display = 'none';
      }
    }

    async function handleEmailLogin(e) {
      e.preventDefault();
      btnEmailLogin.disabled = true;
      btnEmailLogin.textContent = 'מתחבר...';

      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        showToast('שגיאה בהתחברות: אימייל או סיסמה שגויים');
      }
      
      btnEmailLogin.disabled = false;
      btnEmailLogin.textContent = 'התחברות';
    }

    async function signInWithProvider(provider) {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: provider,
        options: {
          redirectTo: window.location.origin + window.location.pathname
        }
      });
      if (error) showToast('שגיאה בהתחברות עם ' + provider);
    }

    async function logout() {
      await supabaseClient.auth.signOut();
    }

    // --- Data Logic ---

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('active');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toastEl.classList.remove('active');
      }, 3000);
    }

    function formatDate(isoString) {
      const d = new Date(isoString);
      return d.toLocaleDateString('he-IL', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadData() {
      tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">טוען...</td></tr>';
      
      const { data, error } = await supabaseClient
        .from('letters')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">שגיאה בטעינת נתונים</td></tr>';
        totalCount.textContent = 'שגיאה';
        return;
      }

      letters = data || [];
      renderTable();
    }

    function renderTable() {
      totalCount.textContent = `${letters.length} מכתבים בסך הכל`;
      
      if (letters.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">אין מכתבים במערכת.</td></tr>';
        return;
      }

      tableBody.innerHTML = letters.map(l => `
        <tr>
          <td class="date" dir="ltr" style="text-align: right;">${formatDate(l.created_at)}</td>
          <td><span class="club-id">${l.club_id}</span></td>
          <td><div class="text-preview" title="${l.text.replace(/"/g, '&quot;')}">${l.text}</div></td>
          <td>
            <button class="btn btn-outline" style="padding: 6px; color: var(--color-destructive); border-color: transparent;" onclick="deleteSingle('${l.id}')" title="מחק">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    async function deleteSingle(id) {
      if (!confirm('האם אתה בטוח שברצונך למחוק מכתב זה?')) return;
      
      const { error } = await supabaseClient.from('letters').delete().eq('id', id);
      if (error) {
        alert('שגיאה במחיקה: ' + error.message);
      } else {
        showToast('המכתב נמחק בהצלחה');
        loadData();
      }
    }

    // Modal Handlers
    document.getElementById('btnDeleteAll').addEventListener('click', () => {
      if(letters.length === 0) {
        showToast('אין מה למחוק');
        return;
      }
      modal.classList.add('active');
    });

    document.getElementById('btnCancelDelete').addEventListener('click', () => {
      modal.classList.remove('active');
    });

    document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
      const { error } = await supabaseClient.from('letters').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      
      modal.classList.remove('active');
      
      if (error) {
        alert('שגיאה במחיקת הנתונים: ' + error.message);
      } else {
        showToast('כל הנתונים נמחקו בהצלחה');
        loadData();
      }
    });
    
    // Subscribe to realtime updates
    supabaseClient.channel('admin-channel')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'letters' }, () => {
        // Only reload if user is authenticated and viewing the dashboard
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          if(session) loadData(); 
        });
      })
      .subscribe();

  </script>
</body>
</html>
